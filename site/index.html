<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WenwenToMe / 文文tome 原型预览</title>
  <meta name="description" content="文文tome 2.0 可点击交互原型，包含书架、发现、我的与阅读器界面方案。" />
  <meta http-equiv="refresh" content="0; url=./wenwentome-v2-prototype.html" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f2ede3;
      --panel: rgba(255, 252, 245, 0.88);
      --text: #231815;
      --muted: #6d6257;
      --accent: #b85c38;
      --accent-strong: #8d3f1e;
      --border: rgba(35, 24, 21, 0.08);
      --shadow: 0 24px 80px rgba(82, 45, 27, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(255, 206, 159, 0.48), transparent 38%),
        radial-gradient(circle at bottom right, rgba(195, 110, 73, 0.24), transparent 32%),
        linear-gradient(160deg, #f7f2ea 0%, #efe3d4 52%, #e9dbc8 100%);
      color: var(--text);
      font-family: "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    .panel {
      width: min(100%, 560px);
      padding: 32px 28px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-strong);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.08;
    }

    p {
      margin: 14px 0 0;
      line-height: 1.7;
      color: var(--muted);
      font-size: 15px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button.primary {
      color: #fffaf4;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      box-shadow: 0 14px 30px rgba(141, 63, 30, 0.22);
    }

    .button.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid var(--border);
    }
  </style>
  <script>
    window.location.replace("./wenwentome-v2-prototype.html");
  </script>
</head>
<body>
  <main class="panel">
    <p class="eyebrow">WenwenToMe / 文文tome</p>
    <h1>正在进入可点击原型页</h1>
    <p>
      发布站首页已切换为文文tome 2.0 原型预览入口。如果浏览器没有自动跳转，可以手动打开原型页或查看迁移公告。
    </p>
    <div class="actions">
      <a class="button primary" href="./wenwentome-v2-prototype.html">打开原型页</a>
      <a class="button secondary" href="./migration-notice.html">查看迁移公告</a>
    </div>
  </main>
</body>
</html>
