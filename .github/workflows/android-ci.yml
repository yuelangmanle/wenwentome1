name: android-ci

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release metadata pack
        run: python3 scripts/release_metadata.py validate-pack app/build.gradle CHANGELOG.md app/src/main/assets/updateLog.md README.md --site-path site/index.html

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run debug unit tests and assemble debug APK
        # Avoid running debug/release unit-test aggregates together because Room schemas
        # are exported to the same build directory in core:database.
        run: ./gradlew :app:testDebugUnitTest :app:assembleAppDebug --stacktrace --no-daemon

      - name: Upload debug APK artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/app/debug/*.apk
          if-no-files-found: warn
