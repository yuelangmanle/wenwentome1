name: android-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "当前 main 版本的 release tag，例如 v1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release context
        id: release_context
        run: |
          python3 scripts/release_metadata.py release-context \
            --event-name "${GITHUB_EVENT_NAME}" \
            --ref-type "${GITHUB_REF_TYPE}" \
            --ref-name "${GITHUB_REF_NAME}" \
            --manual-tag "${{ github.event.inputs.tag_name }}" \
            --output "$GITHUB_OUTPUT"

      - name: Verify tag commit belongs to main
        run: git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Validate release version metadata
        run: python3 scripts/release_metadata.py check-tag "${{ steps.release_context.outputs.tag_name }}" app/build.gradle.kts

      - name: Prepare release notes
        run: python3 scripts/release_metadata.py notes "${{ steps.release_context.outputs.version }}" CHANGELOG.md > release-notes.md

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required secret: ${secret_name}"
              exit 1
            fi
          done

      - name: Restore release signing archive
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.p12"

      - name: Assemble signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_context.outputs.tag_name }}
          name: ${{ steps.release_context.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          files: app/build/outputs/apk/release/*.apk
