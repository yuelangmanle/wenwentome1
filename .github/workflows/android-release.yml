name: android-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "当前 main 版本的 release tag，例如 v1.0"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release context
        id: release_context
        run: |
          python3 scripts/release_metadata.py release-context \
            --event-name "${GITHUB_EVENT_NAME}" \
            --ref-type "${GITHUB_REF_TYPE}" \
            --ref-name "${GITHUB_REF_NAME}" \
            --manual-tag "${{ github.event.inputs.tag_name }}" \
            --output "$GITHUB_OUTPUT"

      - name: Verify manual dispatch tag points to selected commit
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG_NAME: ${{ steps.release_context.outputs.tag_name }}
        run: |
          git fetch --tags --force
          if ! git rev-parse "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "::error::workflow_dispatch 只允许补发已经存在的正式 tag"
            exit 1
          fi
          TAG_SHA="$(git rev-list -n 1 "${TAG_NAME}")"
          if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::workflow_dispatch tag ${TAG_NAME} 未指向当前 main 提交 ${GITHUB_SHA}"
            exit 1
          fi

      - name: Verify tag commit belongs to main
        run: git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Validate release version metadata
        run: python3 scripts/release_metadata.py check-tag "${{ steps.release_context.outputs.tag_name }}" app/build.gradle

      - name: Validate release metadata pack
        run: python3 scripts/release_metadata.py validate-pack app/build.gradle CHANGELOG.md app/src/main/assets/updateLog.md README.md --site-path site/index.html

      - name: Prepare release notes
        run: python3 scripts/release_metadata.py notes "${{ steps.release_context.outputs.version }}" CHANGELOG.md > release-notes.md

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required secret: ${secret_name}"
              exit 1
            fi
          done

      - name: Restore release signing archive
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Assemble signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleAppRelease --stacktrace --no-daemon \
            -PRELEASE_STORE_FILE="$ANDROID_KEYSTORE_PATH" \
            -PRELEASE_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_context.outputs.tag_name }}
          name: ${{ steps.release_context.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          files: app/build/outputs/apk/app/release/*.apk
